<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-left">
                <h1 class="logo">⚡ Synapse</h1>
                <span class="level-badge">LVL 1</span>
            </div>
            <div class="header-right">
                <div class="xp-container">
                    <span class="xp-text">XP: <span id="totalXP">0</span></span>
                    <div class="xp-bar">
                        <div class="xp-fill" id="xpFill"></div>
                    </div>
                </div>
            </div>
        </header>
        <main class="main">
            <div class="stats-row">
                <div class="stat-card">
                    <span class="stat-number" id="totalSubjects">0</span>
                    <span class="stat-label">Subjects</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="totalTopics">0</span>
                    <span class="stat-label">Topics</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="completedTopics">0</span>
                    <span class="stat-label">Completed</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="streakCount">0🔥</span>
                    <span class="stat-label">Streak</span>
                </div>
            </div>
            <div class="card">
                <h2 class="card-title">➕ Add Subject</h2>
                <div class="input-row">
                    <input type="text" id="subjectInput" placeholder="Enter subject name..." class="input"/>
                    <button onclick="addSubject()" class="btn-primary">Add</button>
                </div>
            </div>
            <div id="subjectsList"></div>
        </main>
    </div>
    <script src="supabase.js"></script>
    <script src="app.js"></script>
</body>
</html>
